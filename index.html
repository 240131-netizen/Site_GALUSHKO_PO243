<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Firebase</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; width: 100%; }
        
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; padding-bottom: 45px; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; }
        .time { font-size: 11px; color: #999; float: right; }

        /* Кнопка удаления текстом справа внизу */
        .delete-text-btn { 
            position: absolute; bottom: 12px; right: 15px; 
            background: none; border: none; color: #ff4d4d; 
            cursor: pointer; font-size: 13px; font-weight: 500; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMU10sdX-NMzO1at3hgLclApVAgwqDu4E",
            authDomain: "galushkodenis-7833b.firebaseapp.com",
            projectId: "galushkodenis-7833b",
            storageBucket: "galushkodenis-7833b.firebasestorage.app",
            messagingSenderId: "176104150786",
            appId: "1:176104150786:web:2d8044114a4fd4a9c0141b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. ФУНКЦИЯ УДАЛЕНИЯ (Удаляет навсегда из базы)
        window.deletePost = async (id) => {
            if (!confirm("Удалить этот пост?")) return;
            try {
                await deleteDoc(doc(db, "requests", id));
                // Мы не удаляем элемент вручную через .remove(), 
                // за нас это сделает onSnapshot автоматически!
            } catch (e) {
                console.error("Ошибка при удалении:", e);
            }
        };

        // 2. ФУНКЦИЯ ЛАЙКА
        window.processLike = async (id) => {
            await updateDoc(doc(db, "requests", id), { likes: increment(1) });
        };

        // 3. ФУНКЦИЯ ДОБАВЛЕНИЯ
        document.getElementById('mainBtn').onclick = async () => {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            if(!name || !email) return alert("Заполните поля");

            await addDoc(collection(db, "requests"), {
                name, email, likes: 0, timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
        };

        // 4. МЕТОД: УМНАЯ СИНХРОНИЗАЦИЯ (через docChanges)
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');

            snapshot.docChanges().forEach((change) => {
                const id = change.doc.id;
                const data = change.doc.data();

                // ЕСЛИ ДОБАВЛЕН НОВЫЙ ПОСТ
                if (change.type === "added") {
                    const postHtml = `
                        <div class="post" id="post-${id}">
                            <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                            <b>${data.name}</b>
                            <p style="margin: 5px 0;">${data.email}</p>
                            <button class="like-btn" onclick="processLike('${id}')">👍 <span id="likes-${id}">${data.likes || 0}</span></button>
                            <button class="delete-text-btn" onclick="deletePost('${id}')">Удалить</button>
                        </div>`;
                    feed.insertAdjacentHTML('afterbegin', postHtml);
                }

                // ЕСЛИ ПОСТ ИЗМЕНЕН (например, лайк)
                if (change.type === "modified") {
                    const likesSpan = document.getElementById(`likes-${id}`);
                    if (likesSpan) likesSpan.innerText = data.likes || 0;
                }

                // ЕСЛИ ПОСТ УДАЛЕН В БАЗЕ (onSnapshot это увидит)
                if (change.type === "removed") {
                    const postElement = document.getElementById(`post-${id}`);
                    if (postElement) postElement.remove();
                }
            });
        });
    </script>
</body>
</html>
