<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Firebase - Full CRUD</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; padding-bottom: 50px; }
        .time { font-size: 11px; color: #999; float: right; }
        .edit-info { font-size: 10px; color: #007bff; display: block; margin: 4px 0; font-style: italic; }

        /* Блок кнопок внизу справа */
        .post-actions { position: absolute; bottom: 12px; right: 15px; display: flex; gap: 12px; }
        .action-link { background: none; border: none; cursor: pointer; font-size: 12px; font-weight: 600; padding: 0; }
        .link-edit { color: #007bff; }
        .link-delete { color: #ff4d4d; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Управление записями</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, deleteDoc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMU10sdX-NMzO1at3hgLclApVAgwqDu4E",
            authDomain: "galushkodenis-7833b.firebaseapp.com",
            projectId: "galushkodenis-7833b",
            storageBucket: "galushkodenis-7833b.firebasestorage.app",
            messagingSenderId: "176104150786",
            appId: "1:176104150786:web:2d8044114a4fd4a9c0141b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- 1. ФУНКЦИЯ: УДАЛЕНИЕ ---
        window.deletePost = async (id) => {
            if (confirm("Удалить эту запись навсегда?")) {
                try {
                    await deleteDoc(doc(db, "requests", id));
                } catch (e) { alert("Ошибка доступа! Проверьте Rules."); }
            }
        };

        // --- 2. ФУНКЦИЯ: ИЗМЕНЕНИЕ ---
        window.editPost = async (id, currentName) => {
            const newName = prompt("Введите новое имя профиля:", currentName);
            if (newName && newName !== currentName) {
                try {
                    await updateDoc(doc(db, "requests", id), { 
                        name: newName,
                        lastUpdate: `Редактировано: ${newName}`,
                        editedAt: serverTimestamp()
                    });
                } catch (e) { alert("Ошибка при сохранении изменений."); }
            }
        };

        // --- 3. ФУНКЦИЯ: ЛАЙК ---
        window.processLike = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });

        // --- 4. ФУНКЦИЯ: ДОБАВЛЕНИЕ ---
        document.getElementById('mainBtn').onclick = async () => {
            const n = document.getElementById('name').value;
            const e = document.getElementById('email').value;
            if(!n || !e) return alert("Заполните все поля!");
            
            await addDoc(collection(db, "requests"), {
                name: n, email: e, likes: 0, timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
            document.getElementById('name').value = "";
        };

        // --- 5. REAL-TIME ЛЕНТА ---
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
    const feed = document.getElementById('feed');
    feed.innerHTML = ""; // Очищаем старое, чтобы не дублировать
    
    snapshot.forEach((doc) => {
        const d = doc.data();
        const id = doc.id;
        const time = d.timestamp?.toDate().toLocaleTimeString() || '...';

        // Формируем HTML карточки
        feed.innerHTML += `
            <div class="post" id="post-${id}" style="position: relative; padding-bottom: 50px; margin-bottom: 15px; background: white; border-radius: 8px; border: 1px solid #eaeaea; padding: 15px;">
                <span class="time" style="font-size: 11px; color: #999; float: right;">${time}</span>
                <b>${d.name}</b>
                ${d.lastUpdate ? `<br><small style="color: #007bff; font-style: italic;">${d.lastUpdate}</small>` : ''}
                <p style="margin: 8px 0; color: #555;">${d.email}</p>
                
                <button class="like-btn" onclick="processLike('${id}')">👍 ${d.likes || 0}</button>
                
                <div style="position: absolute; bottom: 12px; right: 15px; display: flex; gap: 15px;">
                    <button onclick="editPost('${id}', '${d.name}')" style="background: none; border: none; color: #007bff; cursor: pointer; font-size: 13px; font-weight: 500; padding: 0;">Изменить</button>
                    <button onclick="deletePost('${id}')" style="background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 13px; font-weight: 500; padding: 0;">Удалить</button>
                </div>
            </div>
        `;
    });
});
    </script>
</body>
</html>
