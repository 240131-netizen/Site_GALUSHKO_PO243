<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS Firebase - Fixed Rules</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; }
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; padding-bottom: 50px; }
        .time { font-size: 11px; color: #999; float: right; }
        .edit-info { font-size: 10px; color: #007bff; display: block; margin-bottom: 5px; font-style: italic; }
        .controls { position: absolute; bottom: 12px; right: 15px; display: flex; gap: 10px; }
        .btn-act { background: none; border: none; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, deleteDoc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMU10sdX-NMzO1at3hgLclApVAgwqDu4E",
            authDomain: "galushkodenis-7833b.firebaseapp.com",
            projectId: "galushkodenis-7833b",
            storageBucket: "galushkodenis-7833b.firebasestorage.app",
            messagingSenderId: "176104150786",
            appId: "1:176104150786:web:2d8044114a4fd4a9c0141b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ФУНКЦИЯ: УДАЛЕНИЕ
        window.deletePost = async (id) => {
            if (confirm("Удалить из базы навсегда?")) {
                try {
                    await deleteDoc(doc(db, "requests", id));
                } catch (e) { alert("Ошибка: Проверьте Rules в Firebase!"); }
            }
        };

        // ФУНКЦИЯ: РЕДАКТИРОВАНИЕ
        window.editPost = async (id, oldName) => {
            const newName = prompt("Новое имя:", oldName);
            if (newName && newName !== oldName) {
                await updateDoc(doc(db, "requests", id), { 
                    name: newName,
                    lastUpdate: `Изменен на "${newName}"`,
                    editedAt: serverTimestamp()
                });
            }
        };

        // ФУНКЦИЯ: ЛАЙК
        window.processLike = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });

        // ДОБАВЛЕНИЕ
        document.getElementById('mainBtn').onclick = async () => {
            const n = document.getElementById('name').value;
            const e = document.getElementById('email').value;
            if(n && e) {
                await addDoc(collection(db, "requests"), { name: n, email: e, likes: 0, timestamp: serverTimestamp() });
                document.getElementById('email').value = "";
            }
        };

        // ОТОБРАЖЕНИЕ
        onSnapshot(query(collection(db, "requests"), orderBy("timestamp", "desc")), (snap) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snap.forEach((doc) => {
                const d = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${d.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                        <b>${d.name}</b>
                        ${d.lastUpdate ? `<span class="edit-info">${d.lastUpdate}</span>` : ''}
                        <p>${d.email}</p>
                        <button class="btn-act" onclick="processLike('${doc.id}')">👍 ${d.likes || 0}</button>
                        <div class="controls">
                            <button class="btn-act" style="color: #007bff" onclick="editPost('${doc.id}', '${d.name}')">Изменить</button>
                            <button class="btn-act" style="color: #ff4d4d" onclick="deletePost('${doc.id}')">Удалить</button>
                        </div>
                    </div>`;
            });
        });
    </script>
</body>
</html>
