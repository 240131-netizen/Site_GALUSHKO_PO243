<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>BaaS - Editing Feature</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button#mainBtn { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; padding-bottom: 50px; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; font-size: 14px; transition: 0.2s; }
        .time { font-size: 11px; color: #999; float: right; }

        /* Контейнер для кнопок управления снизу */
        .controls { position: absolute; bottom: 12px; right: 15px; display: flex; gap: 10px; }
        .edit-btn { background: none; border: none; color: #007bff; cursor: pointer; font-size: 13px; }
        .delete-btn-text { background: none; border: none; color: #ff4d4d; cursor: pointer; font-size: 13px; }
    </style>
</head>
<body>

    <div class="container">
        <h3>Панель управления</h3>
        <input type="text" id="name" placeholder="Имя профиля">
        <input type="email" id="email" placeholder="Рабочий Email">
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, increment, deleteDoc 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMU10sdX-NMzO1at3hgLclApVAgwqDu4E",
            authDomain: "galushkodenis-7833b.firebaseapp.com",
            projectId: "galushkodenis-7833b",
            storageBucket: "galushkodenis-7833b.firebasestorage.app",
            messagingSenderId: "176104150786",
            appId: "1:176104150786:web:2d8044114a4fd4a9c0141b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // МЕТОД: РЕДАКТИРОВАНИЕ
        window.editPost = async (id, oldName) => {
            const newName = prompt("Введите новое имя:", oldName);
            if (newName && newName !== oldName) {
                await updateDoc(doc(db, "requests", id), { name: newName });
            }
        };

        // МЕТОД: УДАЛЕНИЕ
        window.deletePost = async (id) => {
            if (confirm("Удалить запись?")) await deleteDoc(doc(db, "requests", id));
        };

        // МЕТОД: ЛАЙК
        window.processLike = async (id) => {
            await updateDoc(doc(db, "requests", id), { likes: increment(1) });
        };

        // МЕТОД: ДОБАВЛЕНИЕ
        document.getElementById('mainBtn').onclick = async () => {
            await addDoc(collection(db, "requests"), {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                likes: 0,
                timestamp: serverTimestamp()
            });
            document.getElementById('email').value = "";
        };

        // МЕТОД: REAL-TIME СИНХРОНИЗАЦИЯ (Твой исходный метод)
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            snapshot.forEach((doc) => {
                const data = doc.data();
                feed.innerHTML += `
                    <div class="post">
                        <span class="time">${data.timestamp?.toDate().toLocaleTimeString() || '...'}</span>
                        <b>${data.name}</b>
                        <p style="margin: 5px 0;">${data.email}</p>
                        <button class="like-btn" onclick="processLike('${doc.id}')">👍 ${data.likes || 0}</button>
                        
                        <div class="controls">
                            <button class="edit-btn" onclick="editPost('${doc.id}', '${data.name}')">Редактировать</button>
                            <button class="delete-btn-text" onclick="deletePost('${doc.id}')">Удалить</button>
                        </div>
                    </div>
                `;
            });
        });
    </script>
</body>
</html>
