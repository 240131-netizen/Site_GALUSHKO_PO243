<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Firebase CRUD + Image URL</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .container { width: 100%; max-width: 500px; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .auth-bar { background: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #007bff; }
        
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:hover { background: #0056b3; }
        
        .post { background: #fff; border: 1px solid #eaeaea; padding: 15px; margin-top: 15px; border-radius: 8px; width: 100%; max-width: 500px; position: relative; }
        .post-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        .post-avatar { width: 30px; height: 30px; border-radius: 50%; }
        /* Стиль для картинки, которая загружается по ссылке */
        .post-content-img { width: 100%; border-radius: 8px; margin: 10px 0; display: block; border: 1px solid #eee; }
        
        .time { font-size: 11px; color: #999; margin-left: auto; }
        .like-btn { cursor: pointer; border: none; background: #f8f9fa; padding: 5px 12px; border-radius: 20px; margin-top: 10px; }
    </style>
</head>
<body>

    <div id="authSection" class="container" style="text-align: center;">
        <button id="loginBtn">Войти через Google</button>
        <div id="userInfo" style="display: none;" class="auth-bar">
            <img id="userPhoto" class="user-avatar" src="" alt="Avatar">
            <span id="userName" style="font-weight: bold;"></span>
            <button id="logoutBtn" style="background: #ff4757; width: auto; padding: 8px 15px;">Выйти</button>
        </div>
    </div>

    <div id="messageForm" class="container" style="display: none;">
        <h3>Создать запись</h3>
        <input type="text" id="content" placeholder="Что у вас нового?">
        <input type="text" id="imgUrl" placeholder="Ссылка на картинку (URL)">
        
        <button id="mainBtn">Опубликовать в облако</button>
    </div>

    <div id="feed" style="width: 100%; max-width: 500px;"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { 
            getFirestore, collection, addDoc, query, orderBy, onSnapshot, 
            serverTimestamp, updateDoc, doc, deleteDoc, increment 
        } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCMU10sdX-NMzO1at3hgLclApVAgwqDu4E",
            authDomain: "galushkodenis-7833b.firebaseapp.com",
            projectId: "galushkodenis-7833b",
            storageBucket: "galushkodenis-7833b.firebasestorage.app",
            messagingSenderId: "176104150786",
            appId: "1:176104150786:web:2d8044114a4fd4a9c0141b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // --- ЛОГИКА ВХОДА ---
        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('loginBtn').style.display = 'none';
                document.getElementById('userInfo').style.display = 'flex';
                document.getElementById('messageForm').style.display = 'block';
                document.getElementById('userName').innerText = user.displayName;
                document.getElementById('userPhoto').src = user.photoURL;
            } else {
                document.getElementById('loginBtn').style.display = 'block';
                document.getElementById('userInfo').style.display = 'none';
                document.getElementById('messageForm').style.display = 'none';
            }
        });

        document.getElementById('loginBtn').onclick = () => signInWithPopup(auth, provider);
        document.getElementById('logoutBtn').onclick = () => signOut(auth);

        // --- ДОБАВЛЕНИЕ (Сохраняем текст + URL картинки) ---
        document.getElementById('mainBtn').onclick = async () => {
    const text = document.getElementById('content').value;
    const link = document.getElementById('imgUrl').value;

    if(!text) return alert("Введите текст сообщения!");
    
    try {
        await addDoc(collection(db, "requests"), {
            name: auth.currentUser.displayName,
            email: auth.currentUser.email, // ВАЖНО: это поле нужно для твоих Rules
            photo: auth.currentUser.photoURL,
            text: text,
            externalImg: link, // Ссылка на картинку
            likes: 0,
            timestamp: serverTimestamp()
        });
        
        document.getElementById('content').value = "";
        document.getElementById('imgUrl').value = "";
    } catch (e) {
        console.error(e); // Посмотри сюда в консоли F12, если ошибка останется
        alert("Ошибка! Проверьте консоль.");
    }
};

        // --- ЛЕНТА (Отображаем картинку, если ссылка есть) ---
        const q = query(collection(db, "requests"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const feed = document.getElementById('feed');
            feed.innerHTML = "";
            
            snapshot.forEach((doc) => {
                const d = doc.data();
                const id = doc.id;
                const time = d.timestamp?.toDate().toLocaleTimeString() || '...';

                feed.innerHTML += `
                    <div class="post">
                        <div class="post-header">
                            <img src="${d.photo || ''}" class="post-avatar">
                            <b>${d.name}</b>
                            <span class="time">${time}</span>
                        </div>
                        <p>${d.text}</p>
                        
                        ${d.externalImg ? `<img src="${d.externalImg}" class="post-content-img" onerror="this.style.display='none'">` : ''}
                        
                        <button class="like-btn" onclick="processLike('${id}')">👍 ${d.likes || 0}</button>
                        
                        <div style="margin-top: 10px; text-align: right;">
                            <button onclick="deletePost('${id}')" style="background:none; color:red; width:auto; font-size:12px;">Удалить</button>
                        </div>
                    </div>
                `;
            });
        });

        window.processLike = (id) => updateDoc(doc(db, "requests", id), { likes: increment(1) });
        window.deletePost = (id) => confirm("Удалить?") && deleteDoc(doc(db, "requests", id));
    </script>
</body>
</html>
